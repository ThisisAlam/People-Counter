<html>
	<head>
    	<style>
        	body {
            	font-family: Arial, sans-serif;
            }
        	.main {
            	display:flex;
                justify-content:center;
                align-items:center;
                flex-direction:column;
            	position:relative;
                gap:10px;
                height:550px;
                width:500px;
                border:2px solid black;
                margin-left:auto;
                margin-right:auto;
                border:2px dashed grey;
                border-radius:20px;
                text-align:center;
                padding:15px;
                margin-top:30px;
            }
            .section1 {
            	display:flex;
                justify-content:center;
                align-items:center;
                flex-direction:column;
            	position:relative;
                height:400px;
                width:100%;
                background: #F6F6F6;
                border:2px solid black;
                border-radius:15px;
                transition: transform 0.3s ease;
            }
            .section1:hover {
            	transform: scale(1.01);
            }
            .section1 .text {
            	margin-top:10px;
            	font-size:22px;		
            }
            .text #num-el {
            	font-size:70px;
            }
            .section1 .btnz {
            	display:flex;
                justify-content:center;
                align-items:center;
                flex-direction:row;
            	position:relative;
                gap:20px;
                height:100px;
                width:100%;
            }
            .btnz button {
            	width:170px;
                height:50px;
                font-size:25px;
            	border:2px solid black;
                border-radius:8px;
                background: white;
                transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, color 0.3s ease;
            }
            .btnz button:hover {
            	transform: translateY(-3px);
                box-shadow: 0 2px 3px grey;
                background: #212121;
                color: white;
            }
            .btnz button:active {
            	transform: translateY(3px);
                box-shadow: 0 -1px 4px grey;  
            }
            #reset-btn {
            	position:relative;
            	border-radius:10px;
                width:80px;
                height:50px;
                font-size:15px;
                font-weight:bold;
                background: #D3D3D3;
            }
            #reset-btn:hover {
            	color: black;
            }
            .section2 {
            	display:flex;
                justify-content:center;
                align-items:center;
            	position:relative;
                height:75px;
                width:100%;
                background: #F6F6F6;
                border:2px solid black;
                border-radius:15px;
                transition: transform 0.3s ease;
            }
            .section2:hover {
            	transform: scale(1.01);
            }
            .section2 p {
            	font-size:18px;
                font-weight:bold;
                max-width:400px;
                max-height:100px;
                overflow:hidden;
            }
            .section3 {
            	display:flex;
                justify-content:center;
                align-items:center;
            	position:relative;
                height:75px;
                width:100%;
                background: #F6F6F6;
                border:2px solid black;
                border-radius:15px;
                transition: transform 0.3s ease;
            }
            .section3:hover {
            	transform: scale(1.01);
            }
            .section3 p {
            	font-size:18px;
                font-weight:bold;
            }
        </style>
    </head>
    
    <body>
    	<div class="main">
        	<div class="section1">
            	<div class="text">
                  <h1 id="people-el">People Entered:</h1>
                  <h1 id="num-el">0</h1>
                </div>
                <div class="btnz">
                	<button id="reset-btn" onclick="reset()">Reset</button>
                    <button id="increment" onclick="increment()">Increment</button>
                    <button id="save" onclick="save()">Save</button>
                </div>
            </div>
            <div class="section2">
            	<p>Previous Entries:<span id="entries-el"></span></p>
            </div>
            <div class="section3">
            	<p>Total Entries:<span id="sum-el"></span></p>
            </div>
            
        </div>
    	<script>
        	const showCount = document.getElementById("num-el")
            const showEntries = document.getElementById("entries-el")
            const showSum = document.getElementById("sum-el")
            const saveBtn = document.getElementById("save")
            
            saveBtn.disabled = true
            
            let count = 0
            let saved = 0
            let sum = 0
            function increment() {
            	count ++
                showCount.textContent = count
                saveBtn.disabled = false
            }
            function save() {
            	saved = count
                showEntries.textContent += "| " + saved + " |"
                showSum.textContent = " "
                TotalEntries()
                count = 0
                showCount.textContent = 0
                saveBtn.disabled = true	
             }
            function TotalEntries() {
            	sum += count
                showSum.textContent = " " + sum 
            }
            function reset() {
            	count = 0
                sum = 0
                saved = 0
                showCount.textContent = 0
                showSum.textContent = " "
                showEntries.textContent = " "
                saveBtn.disabled = true
            }
        </script>
    </body>
</html>
